twoFactorEnabled: false
# Phase 34 / D-11 — stub generation factor range.
# Per-site stub count ≈ factor × consented count; factor drawn seeded from [factorMin, factorMax].
stubs:
  factorMin: 2
  factorMax: 8
therapyInterrupterDays: 120
therapyBreakerDays: 365
crtImplausibleThresholdUm: 400     # Phase 33 / COH-03: CRT implausibility threshold in µm
dataSource:
  type: local
  blazeUrl: http://localhost:8080/fhir
outcomes:
  serverAggregationThresholdPatients: 1000
  aggregateCacheTtlMs: 1800000
# Phase 20 / D-23 — refresh-token configuration. YAML-only in v1.8 (no UI).
auth:
  refreshTokenTtlMs: 28800000      # 8h rolling refresh-token lifetime
  refreshAbsoluteCapMs: 43200000   # 12h hard cap from initial login
  refreshCookieSecure: true        # set to false ONLY for local-dev http
  # Phase 32 / AUTHCFG-04 — login lockout + inactivity configuration
  maxLoginAttempts: 5              # max failed logins before lockout
  lockoutCapMs: 900000             # exponential backoff cap: lockout = min(2^failures * 1s, lockoutCapMs), not a fixed window
  inactivityTimeoutMs: 600000      # 10 min inactivity before auto-logout
  warningBeforeMs: 180000          # 3 min warning before auto-logout (AUTHCFG-02)
# Phase 25 / D-16, D-17 — terminology resolver. Code-defaulted; omit to keep
# offline behavior. Set enabled: true + a real serverUrl to opt in.
# terminology:
#   enabled: false                                          # default OFF — preserves offline behavior
#   serverUrl: 'https://r4.ontoserver.csiro.au/fhir'        # placeholder default; real server set per-deployment
#   cacheTtlMs: 86400000                                    # 24h
