  - eslint.config.js
  - knip.json
  - package.json
  - package-lock.json
  - tsconfig.json
  - tsconfig.node.json
  - vite.config.ts
  - vitest.config.ts
  - postcss.config.js
  - tailwind.config.ts
  - index.html
  - CLAUDE.md
  - DEFERRED-UPGRADES.md
  - DEFERRED-LINT.md
